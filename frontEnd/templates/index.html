<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupportLens AI</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="container">

        <h1>SupportLens AI</h1>
        <p>Enterprise IT Incident Analyzer</p>

        <textarea
            id="issue"
            placeholder="Describe the issue..."></textarea>

        <textarea
            id="logs"
            placeholder="Paste logs here (optional)..."></textarea>

        <br><br>

        <input
            type="file"
            id="image"
            accept="image/*">

        <br><br>

        <button onclick="analyzeIssue()">
            Analyze
        </button>

        <div id="result"></div>

    </div>

    <script src="/static/script.js"></script>

</body>

</html>
